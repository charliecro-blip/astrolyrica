      - broad political argument
      - dream sequence fog
    objects:
      - guttering beeswax taper
      - buckled satin shoe
      - greasepaint tin
      - singed paper program
      - cracked opera glass
      - velvet rope hook
    places:
      - backstage stairwell
      - provincial opera house
      - rehearsal room with covered mirrors
      - candle shelf beside the wings
    gestures:
      - cupping flame from a draft
      - pinning a hem with clenched teeth
      - swallowing before the curtain rises
      - scraping wax from a cue sheet
    social_situations:
      - understudy waiting in costume
      - patrons whispering through an aria
      - stagehands trading blame in the wings
      - a director clapping once for silence
    textures:
      - warm wax runnels
      - powdery makeup
