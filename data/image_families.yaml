image_families:
  - id: puppet_theater
    name: Puppet Theater
    description: Miniature stages, hand-built figures, visible strings, and public make-believe with awkward mechanics left showing.
    best_for:
      - performed control
      - inherited roles
      - comic dread
      - private motives in public rooms
    avoid_for:
      - direct confession
      - wide landscapes
      - solemn prophecy
    objects:
      - painted wooden prince
      - brass curtain rings
      - felt wolf snout
      - tangled linen strings
      - cracked footlight bulbs
      - cardboard moon pulley
    places:
      - school auditorium stage
      - fairground booth
      - attic rehearsal corner
      - municipal park pavilion
    gestures:
      - lifting a figure by the spine bar
      - bowing with a hinged neck
      - untangling strings with wet fingers
      - hiding a hand below the curtain
    social_situations:
      - children heckling the villain
      - grandparents saving front-row seats
      - a troupe arguing behind painted trees
      - a patron applauding too early
    textures:
      - snagged velvet
      - flaking tempera paint
      - splintered pine
      - chalky papier-mache
    colors:
      - tomato red
      - tarnished gold
      - soot black
      - milk-glass white
    risks:
      - melodrama can flatten the speaker
      - strings may overstate manipulation
      - toy scale can reduce real stakes
    medicine:
      - show the hand, not the sermon
      - let one prop refuse its cue
      - keep the applause uneven

  - id: feast_table
    name: Feast Table
    description: Heavy meals, polished serving tools, crowded seating, and appetites that expose rank, debt, and affection.
    best_for:
      - abundance with tension
      - family politics
      - bargains disguised as hospitality
      - ceremonial appetite
    avoid_for:
      - solitary wilderness
      - weightless mysticism
      - sparse minimalism
    objects:
      - silver gravy boat
      - split pomegranate
      - bread heel in a napkin
      - chipped soup tureen
      - duck bones on blue china
      - pearled oyster fork
    places:
      - rented banquet hall
      - farmhouse dining room
      - hotel side salon
      - long trestle table under awnings
    gestures:
      - carving too close to the thumb
      - passing salt without eye contact
      - folding a napkin into a cone
      - scraping sauce from the platter
    social_situations:
      - a toast that names the wrong person
      - cousins counting chairs
      - a guest refusing seconds too loudly
      - servers waiting for a quarrel to end
    textures:
      - oily linen
      - crisp poultry skin
      - clotted cream
      - dented silver
      - grape-sticky fingers
    colors:
      - burgundy
      - butter yellow
      - porcelain blue
      - roast brown
      - parsley green
    risks:
      - richness can become decorative excess
      - hunger metaphors may turn abstract
      - class tension can become caricature
    medicine:
      - give one dish a practical flaw
      - let utensils carry the argument
      - balance plenty with an unpaid bill

  - id: childhood_games
    name: Childhood Games
    description: Rules invented on pavement and carpet, small competitions, secret penalties, and the serious business of play.
    best_for:
      - memory with teeth
      - informal law
      - rivalry and alliance
      - first lessons in fairness
    avoid_for:
      - adult romance as nostalgia
      - pastoral innocence
      - vague lost-child imagery
    objects:
      - scuffed red kickball
      - bottle-cap checker
      - bent jump-rope handle
      - chalk hopscotch squares
      - marble pouch with a broken snap
      - plastic whistle on yarn
    places:
      - apartment courtyard
      - school blacktop
      - basement rec room
      - alley behind the bakery
      - living-room carpet fort
    gestures:
      - calling a do-over with both palms up
      - hiding the best marble in a sock
      - drawing a finish line with brick dust
      - tagging a shoulder and running crooked
    social_situations:
      - older siblings changing the rules
      - a new kid invited last
      - teams chosen under streetlamps
      - a parent counting down from the porch
    textures:
      - gritty knees
      - warm rubber
      - chalk powder
      - carpet static
    colors:
      - playground orange
      - notebook blue
      - grass-stain green
      - bubblegum pink
      - asphalt gray
    risks:
      - nostalgia can sweeten the conflict
      - game rules may need too much explanation
      - children can become props for adults
    medicine:
      - keep score in objects
      - let the rule change mid-line
      - include one unfair victory

  - id: orchard_picnic
    name: Orchard Picnic
    description: Fruit trees, packed lunches, insects, blankets, and the uneasy leisure of eating beneath cultivated branches.
    best_for:
      - temporary peace
      - ripeness and delay
      - courtship with practical interruptions
      - seasonal bargains
    avoid_for:
      - cosmic grandeur
      - sterile interiors
      - pure innocence
    objects:
      - wicker hamper clasp
      - bruised apricot
      - cheese knife in wax paper
      - thermos cup of lemonade
      - tin of sugared almonds
      - plum pit on a paper plate
    places:
      - ladder row between pear trees
      - irrigation ditch bank
      - pick-your-own checkout shed
      - blanket beside fallen apples
    gestures:
      - brushing ants from the blanket edge
      - twisting a peach free with two fingers
      - shielding a cup from wasps
      - tying a scarf around a low branch
    social_situations:
      - lovers pretending not to watch the road
      - workers eating after the customers leave
      - children trading fruit for cookies
      - an owner weighing a basket twice
    textures:
      - peach fuzz
      - damp wool blanket
      - sticky knife handle
      - dry leaf crackle
      - bee-burred air
    colors:
      - apricot orange
      - pear green
      - picnic-cloth red
      - straw yellow
      - cloudy cider brown
    risks:
      - pastoral ease can erase labor
      - sweetness can turn sentimental
      - fruit images may become too general
    medicine:
      - name the tool that harvested it
      - add insects before beauty settles
      - let the blanket snag on stubble

  - id: candlelit_stage
