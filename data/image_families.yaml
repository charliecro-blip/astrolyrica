      - let the audience hear a hinge

  - id: apothecary_shelf
    name: Apothecary Shelf
    description: Bottles, labels, powders, drawers, and careful measures where cure, commerce, and superstition share a counter.
    best_for:
      - dose and consequence
      - remedies with doubt
      - small inventories of fear
      - bodily specificity
    avoid_for:
      - miracle cures
      - vague alchemy
      - glamorous poison
    objects:
      - brown dropper bottle
      - corked jar of fennel seed
      - blue mortar with chipped lip
      - folded paper powder packet
      - brass dram scale
      - drawer of blank labels
      - licorice root bundle
    places:
      - narrow shop counter
      - back room herb cabinet
      - clinic supply closet
      - window ledge above the radiator
    gestures:
      - tapping powder from a paper crease
      - reading dosage twice under breath
      - wiping syrup from the bottle neck
      - grinding tablets with slow circles
    social_situations:
      - customer asking for credit quietly
      - apprentice misfiling cough lozenges
      - neighbor seeking a remedy after hours
      - pharmacist refusing a dramatic story
    textures:
      - grainy powder
      - sticky syrup
      - brittle cork
      - cool glass
      - dry paper label
    colors:
      - iodine brown
      - cobalt blue
      - calendula yellow
      - label cream
      - oxidized brass
    risks:
      - cure imagery can imply false medicine
      - old-shop detail may become quaint
      - poison/cure binaries can oversimplify
    medicine:
      - keep dosage ordinary and cautious
      - prefer inventory over enchantment
      - make relief partial, not final

